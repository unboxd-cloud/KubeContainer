name: Release

# Cut on tag push (v*): run the gauntlet, build and push the multi-arch
# manager image to GHCR, regenerate the install bundle pinned to the tag,
# and publish a GitHub release carrying it. Tools come from the runner or
# pinned actions only — no third-party release actions in the path.
on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - claude/dreamy-darwin-wcepfb
    paths:
      - "release/REQUEST"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (created if absent)"
        required: true
        default: "v0.1.0"
      target:
        description: "Commit SHA to tag (defaults to the dispatched ref)"
        required: false

permissions: {}

jobs:
  release:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release request
        run: |
          TAG="${{ github.event.inputs.tag }}"; TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TAG" ] && [ "${{ github.ref_type }}" = "branch" ] && [ -f release/REQUEST ]; then
            TAG=$(grep -E '^tag=' release/REQUEST | cut -d= -f2)
            TARGET=$(grep -E '^target=' release/REQUEST | cut -d= -f2)
          fi
          TAG="${TAG:-${{ github.ref_name }}}"
          TARGET="${TARGET:-${{ github.sha }}}"
          { echo "TAG=$TAG"; echo "TARGET=$TARGET";
            echo "IMG=ghcr.io/${{ github.repository_owner }}/kubecontainer:$TAG"; } >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Gauntlet
        run: |
          make test
          make test-report
          make lint
          make vocab-check
          make eval
          make security-report
          ./hack/check-promise.sh

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          docker build -t "$IMG" .
          docker push "$IMG"
          docker build -t "ghcr.io/${{ github.repository_owner }}/kubecontainer-site:$TAG" -f Dockerfile.site .
          docker push "ghcr.io/${{ github.repository_owner }}/kubecontainer-site:$TAG"
          docker build -t "ghcr.io/${{ github.repository_owner }}/filefabric:$TAG" -f Dockerfile.filefabric .
          docker push "ghcr.io/${{ github.repository_owner }}/filefabric:$TAG"
          docker build -t "ghcr.io/${{ github.repository_owner }}/agentregistry:$TAG" -f Dockerfile.agentregistry .
          docker push "ghcr.io/${{ github.repository_owner }}/agentregistry:$TAG"
          docker build -t "ghcr.io/${{ github.repository_owner }}/openautonomyx-site:$TAG" -f Dockerfile.autonomyx .
          docker push "ghcr.io/${{ github.repository_owner }}/openautonomyx-site:$TAG"
          docker build -t "ghcr.io/${{ github.repository_owner }}/arithmetic-platform:$TAG" -f Dockerfile.arithmetic .
          docker push "ghcr.io/${{ github.repository_owner }}/arithmetic-platform:$TAG"
          docker build -t "ghcr.io/${{ github.repository_owner }}/fabric-browser:$TAG" -f Dockerfile.fabric .
          docker push "ghcr.io/${{ github.repository_owner }}/fabric-browser:$TAG"

      - name: Build install bundle pinned to the tag
        run: make build-installer IMG="$IMG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/homesetup-linux-amd64 ./cmd/homesetup
          cd dist && sha256sum install.yaml eval-report.json test-report.json security-report.json homesetup-linux-amd64 > SHA256SUMS && cd ..
          gh release create "$TAG" dist/SHA256SUMS dist/install.yaml dist/eval-report.json dist/test-report.json dist/security-report.json dist/homesetup-linux-amd64 \
            --target "$TARGET" \
            --title "$TAG" \
            --notes "See CHANGELOG.md for this release. Install: kubectl apply -f install.yaml — image: $IMG. The eval report is the release's evidence record."
