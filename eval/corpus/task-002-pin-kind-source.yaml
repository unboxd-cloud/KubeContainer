era: v0.1.0
title: e2e CI fails: kind install source unreachable and unpinned
issue: |
  The e2e workflow downloads kind from kind.sigs.k8s.io with tag
  'latest'; the host is unreachable from CI runners and the unpinned
  version violates the supply-chain policy. Fix the install to be
  pinned and upstream-sourced; the workflow must succeed.
