resolution_commit: 6d06ecc
world_test: >-
  bash -c "grep -q 'releases/download' .github/workflows/test-e2e.yml
  && grep -Eq 'KIND_VERSION. v[0-9]+\.[0-9]+\.[0-9]+'
  .github/workflows/test-e2e.yml"
