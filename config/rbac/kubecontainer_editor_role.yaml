# This rule is not used by the project kubecontainer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kubecontainer.unboxd.cloud.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubecontainer
    app.kubernetes.io/managed-by: kustomize
  name: kubecontainer-editor-role
rules:
- apiGroups:
  - kubecontainer.unboxd.cloud
  resources:
  - kubecontainers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubecontainer.unboxd.cloud
  resources:
  - kubecontainers/status
  verbs:
  - get
