# This rule is not used by the project kubecontainer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to kubecontainer.unboxd.cloud resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubecontainer
    app.kubernetes.io/managed-by: kustomize
  name: kubecontainer-viewer-role
rules:
- apiGroups:
  - kubecontainer.unboxd.cloud
  resources:
  - kubecontainers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubecontainer.unboxd.cloud
  resources:
  - kubecontainers/status
  verbs:
  - get
